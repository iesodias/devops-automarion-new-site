<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        try {
          const theme = localStorage.theme
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (theme === 'dark' || (!theme && prefersDark)) {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>
    <script>
      (() => {
        const l = window.location

        if (l.search.length > 1 && l.search[1] === '/') {
          const decoded = l.search
            .slice(1)
            .split('&')
            .map((part) => part.replace(/~and~/g, '&'))
            .join('?')

          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
          return
        }

        if (l.hash.startsWith('#/')) {
          const hashPath = l.hash.slice(1)
          window.location.replace(l.origin + hashPath)
        }
      })()
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" href="/assets/images/favicon.png" />
    <meta name="theme-color" content="#1c2385" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Ieso Dias" />
    <meta name="robots" content="index, follow" />
    <!-- Dynamic meta tags (title, description, canonical, og:*, twitter:*) are set by each page via React Helmet -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="DevOps Automation" />
    <meta property="og:image" content="https://iesodias.com/assets/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://iesodias.com/assets/images/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Page-specific title is set by React Helmet -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
